# Ultralytics 8.4.30 uyumlu BotSORT + ReID konfigürasyonu
tracker_type: botsort
track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.6
track_buffer: 60
match_thresh: 0.8
fuse_score: True

# Hareketli kamera için global motion compensation
gmc_method: sparseOptFlow

# ReID — model kalıcı yolda, her çalıştırmada tekrar indirilmez
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: true
model: /work/models/yolo26n-cls.pt
